<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>AWT Dossani Job Board</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0e27; --bg2:#1a2140; --bg3:#111830;
    --red:#ff6b6b; --yellow:#ffd93d; --green:#6bcf7f; --darkgreen:#2d7a4f; --blue:#74b9ff;
    --text:#fff; --text2:#cbd5e1; --border:#2d3a5f;
  }
  body{font-family:'Space Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh}
  .wrap{max-width:780px;margin:0 auto;padding:18px}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  h1{font-size:18px}
  .sub{font-size:11px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
  .poll{font-size:10px;color:var(--text2)}

  /* stats */
  .stats{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
  .stat{flex:1 1 calc(25% - 8px);min-width:84px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;transition:.15s}
  .stat.active{border-color:var(--blue)}
  .stat-num{font-size:20px;font-weight:700;line-height:1.1}
  .stat-label{font-size:8px;color:var(--text2);text-transform:uppercase;margin-top:4px;letter-spacing:.04em}

  .controls{display:flex;gap:8px;margin-bottom:14px}
  .search{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none}
  .search:focus{border-color:var(--blue)}

  .store{margin-bottom:14px}
  .store-h{font-size:12px;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border);padding:8px 0;margin-bottom:8px}
  .store-h small{color:var(--text2);font-weight:400}

  .card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s}
  .card:hover{border-color:var(--blue)}
  .card-top{display:flex;justify-content:space-between;gap:8px;align-items:center}
  .card-id{font-size:11px;color:var(--text2)}
  .card-desc{font-size:14px;font-weight:700;margin:6px 0;line-height:1.35;overflow-wrap:anywhere}
  .badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
  .s-dispatched{background:rgba(255,107,107,.18);color:var(--red);border:1px solid var(--red)}
  .s-in_progress{background:rgba(255,217,61,.18);color:var(--yellow);border:1px solid var(--yellow)}
  .s-finished{background:rgba(45,122,79,.25);color:#9fe3b8;border:1px solid var(--darkgreen)}
  .s-closed{background:rgba(107,207,127,.18);color:var(--green);border:1px solid var(--green)}
  .s-waiting{background:rgba(116,185,255,.15);color:var(--blue);border:1px solid var(--blue)}
  .s-other{background:rgba(45,58,95,.4);color:var(--text2);border:1px solid var(--border)}

  .empty{text-align:center;color:var(--text2);font-size:13px;padding:40px 0}

  /* modal */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:flex-start;justify-content:center;padding:0;overflow:auto;-webkit-overflow-scrolling:touch}
  .modal.on{display:flex}
  .sheet{background:var(--bg);border:1px solid var(--border);border-radius:12px;max-width:620px;width:100%;margin:18px;min-height:min-content}
  @media(max-width:699px){.sheet{margin:0;border-radius:0;min-height:100dvh}}
  .sheet-h{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:14px;display:flex;justify-content:space-between;align-items:center;z-index:1}
  .sheet-h h2{font-size:16px}
  .x{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 14px;font-family:inherit;font-weight:700;cursor:pointer}
  .sheet-b{padding:14px}
  .field-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px}
  .val{font-size:14px;line-height:1.5;overflow-wrap:anywhere;white-space:pre-wrap}
  .photo-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .photo-grid img{width:84px;height:84px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer}

  .status-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .status-btn{flex:1 1 calc(50% - 8px);min-width:120px;padding:11px;border-radius:8px;border:2px solid var(--border);background:var(--bg2);color:var(--text);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
  .status-btn.cur{border-color:currentColor}
  .status-btn.b-dispatched{color:var(--red)} .status-btn.b-in_progress{color:var(--yellow)}
  .status-btn.b-finished{color:#9fe3b8} .status-btn.b-closed{color:var(--green)}

  .cmts{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .cmt{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
  .cmt-meta{font-size:10px;color:var(--text2);margin-bottom:3px}
  .cmt-text{font-size:13px;line-height:1.4;overflow-wrap:anywhere;white-space:pre-wrap}
  textarea.cmt-in{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:10px;min-height:60px;resize:vertical;outline:none}
  textarea.cmt-in:focus{border-color:var(--blue)}
  .btn{padding:10px 14px;border:none;border-radius:8px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer}
  .btn-primary{background:var(--blue);color:#0a0e27}
  .btn[disabled]{opacity:.5;cursor:default}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 18px;font-size:13px;z-index:2000;opacity:0;transition:.2s;pointer-events:none}
  .toast.on{opacity:1}
  .toast.err{border-color:var(--red);color:var(--red)}
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:3000;align-items:center;justify-content:center;padding:20px}
  .lightbox.on{display:flex}
  .lightbox img{max-width:100%;max-height:100%;border-radius:8px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><h1 id="boardTitle">Job Board</h1><div class="sub" id="boardSub">loading…</div></div>
    <div class="poll" id="poll">·</div>
  </header>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <input class="search" id="search" placeholder="🔍 Search store, number, or job…" oninput="onSearch(this.value)">
  </div>
  <div id="list"><div class="empty">Loading…</div></div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('on')"><img id="lightboxImg" src="" alt=""></div>
<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   GENERIC VENDOR JOB BOARD  (external, third-party facing)

   ── ONE SOURCE OF TRUTH ──────────────────────────────────────────────────
   This board does NOT own any tickets. Jobs live in ONE place: the
   `maintenanceTickets` node, owned and created by the internal RM-Tracker.
   A job appears on this board purely because its `assignedVendorId` equals
   this board's VENDOR_ID. The board reads those tickets and writes status +
   comments back to the SAME record. No mirror node, no copies, no reconcile.

   ── SCALE ────────────────────────────────────────────────────────────────
   The board fetches ONLY its slice via  GET ...?vendor=<VENDOR_ID>  which
   returns just this vendor's tickets + a trimmed restaurants map. As stores
   and tickets grow, per-load payload stays proportional to THIS vendor's
   work, not the whole company.

   ── MAKING ANOTHER VENDOR BOARD ──────────────────────────────────────────
   Copy this file and change VENDOR_ID (and the title). Nothing else.
   The vendor's id is the key under maintenanceVendors in the master DB.

   ── STATUS MODEL (single canonical status, no second field) ───────────────
   The ticket's `status` is RM's canonical value. This board only exposes the
   subset a vendor drives, with vendor-friendly labels:
       canonical `status`     vendor label
       dispatched             Not Started
       in_progress            In Progress
       finished               Done & Unpaid
       closed                 Paid
   The board writes the canonical value back, so RM and every other view stay
   consistent automatically — there is nothing to reconcile.

   ── TIME ──────────────────────────────────────────────────────────────────
   Epoch milliseconds (Date.now()) everywhere, matching RM-Tracker exactly.
   ════════════════════════════════════════════════════════════════════════ */

// ── Board identity: the only thing that changes per vendor board ──
const VENDOR_ID = "AWT";   // ← set to the maintenanceVendors key for this board
const BOARD_TITLE = "AWT Dossani Job Board";   // ← shown in the header & tab

const API_BASE_URL = "https://alignment-api-khaki.vercel.app/api/dpm-alignment";
const WRITE_PASSWORD = "vendor123";   // ROLES.VENDOR on the API
const POLL_MS = 20000;

// canonical status -> vendor label (only the statuses a vendor acts on)
const VENDOR_STATUS = {
  dispatched:  { label:"Not Started",   cls:"s-dispatched"  },
  in_progress: { label:"In Progress",   cls:"s-in_progress" },
  finished:    { label:"Done & Unpaid", cls:"s-finished"    },
  closed:      { label:"Paid",          cls:"s-closed"      },
};
// statuses a vendor can switch between, in order
const VENDOR_FLOW = ["dispatched","in_progress","finished","closed"];
// any other canonical status (waiting, assigned…) is shown read-only:
function statusView(s){
  if(VENDOR_STATUS[s]) return VENDOR_STATUS[s];
  if(s==="waiting") return {label:"On Hold",cls:"s-waiting"};
  return {label:(s||"—").replace(/_/g," "),cls:"s-other"};
}

// ── State ──
let TICKETS={}, RESTAURANTS={}, VENDOR=null;
let curFilter=null, curSearch="";
let openId=null;

// ── Time (matches RM exactly) ──
function now(){ return Date.now(); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtDate(ts){ if(!ts) return "—"; const d=new Date(ts);
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" · "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}); }

const $=id=>document.getElementById(id);
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function toast(msg,kind){const t=$("toast");t.textContent=msg;t.className="toast on"+(kind==="err"?" err":"");setTimeout(()=>t.className="toast",2200)}

// ── Data layer ──
async function apiGet(){
  const r=await fetch(`${API_BASE_URL}?vendor=${encodeURIComponent(VENDOR_ID)}`,{cache:"no-store"});
  if(!r.ok) throw new Error("Could not reach the server");
  return await r.json();
}
// Write a single ticket back. Sends vendorId so the API can verify ownership.
async function apiWriteTicket(id,ticket){
  const updates={}; updates[`maintenanceTickets/${id}`]=ticket;
  const r=await fetch(API_BASE_URL,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password:WRITE_PASSWORD,vendorId:VENDOR_ID,updates})});
  if(!r.ok){let m="Write failed";try{m=(await r.json()).error||m}catch(e){}throw new Error(m)}
}

async function load(){
  const data=await apiGet();
  TICKETS=data.maintenanceTickets||{};
  RESTAURANTS=data.restaurants||{};
  VENDOR=data.vendor||null;
  $("boardTitle").textContent=BOARD_TITLE;
  document.title=BOARD_TITLE;
  $("boardSub").textContent=Object.keys(TICKETS).length+" jobs · "+Object.keys(RESTAURANTS).length+" stores";
}

// ── Render ──
function storeName(sid){return (RESTAURANTS[sid]&&RESTAURANTS[sid].storeName)||"Unknown store"}
function storeNum(sid){return (RESTAURANTS[sid]&&RESTAURANTS[sid].storeNumber)||""}
function storeAddr(sid){return (RESTAURANTS[sid]&&RESTAURANTS[sid].address)||""}

function ticketsArray(){
  return Object.entries(TICKETS).map(([id,t])=>({_id:id,...t}));
}

function renderStats(){
  const counts={dispatched:0,in_progress:0,finished:0,closed:0};
  ticketsArray().forEach(t=>{ if(counts[t.status]!==undefined) counts[t.status]++; });
  const order=["dispatched","in_progress","finished","closed"];
  $("stats").innerHTML=order.map(s=>{
    const v=VENDOR_STATUS[s];
    const on=curFilter===s?" active":"";
    return `<div class="stat${on}" onclick="toggleFilter('${s}')">
      <div class="stat-num" style="color:var(--${s==='dispatched'?'red':s==='in_progress'?'yellow':s==='finished'?'darkgreen':'green'})">${counts[s]}</div>
      <div class="stat-label">${esc(v.label)}</div></div>`;
  }).join("");
}

function render(){
  renderStats();
  let arr=ticketsArray();
  if(curFilter) arr=arr.filter(t=>t.status===curFilter);
  if(curSearch){
    const q=curSearch.toLowerCase();
    arr=arr.filter(t=>{
      const hay=`${storeName(t.storeId)} ${storeNum(t.storeId)} ${storeAddr(t.storeId)} ${t.description||""} ${t.shortId||""}`.toLowerCase();
      return hay.includes(q);
    });
  }
  const list=$("list");
  if(!arr.length){ list.innerHTML=`<div class="empty">No jobs${curFilter||curSearch?" match this view":" assigned yet"}.</div>`; return; }

  // group by store
  const byStore={};
  arr.forEach(t=>{ (byStore[t.storeId]=byStore[t.storeId]||[]).push(t); });
  const storeIds=Object.keys(byStore).sort((a,b)=>{
    const na=parseInt(String(storeNum(a)).replace(/\D/g,""))||0, nb=parseInt(String(storeNum(b)).replace(/\D/g,""))||0;
    if(na&&nb) return na-nb;
    return storeName(a).localeCompare(storeName(b));
  });
  list.innerHTML=storeIds.map(sid=>{
    const cards=byStore[sid].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).map(t=>{
      const v=statusView(t.status);
      return `<div class="card" onclick="openTicket('${t._id}')">
        <div class="card-top">
          <span class="card-id">#${esc(t.shortId||t._id.slice(0,6))}</span>
          <span class="badge ${v.cls}">${esc(v.label)}</span>
        </div>
        <div class="card-desc">${esc(t.description||"(no description)")}</div>
        <div class="card-id">${t.createdAt?("Filed "+fmtDate(t.createdAt)):""}</div>
      </div>`;
    }).join("");
    return `<div class="store">
      <div class="store-h">${esc(storeName(sid))} ${storeNum(sid)?`<small>· #${esc(storeNum(sid))}</small>`:""}</div>
      ${cards}</div>`;
  }).join("");
}

window.toggleFilter=function(s){ curFilter=curFilter===s?null:s; render(); };
window.onSearch=function(v){ curSearch=(v||"").trim(); render(); };

// ── Ticket detail ──
window.openTicket=function(id){
  openId=id;
  const t={_id:id,...TICKETS[id]};
  const v=statusView(t.status);
  const photos=Array.isArray(t.photos)?t.photos:[];
  const photoHtml=photos.length?`<div class="field-label">Photos</div><div class="photo-grid">${
    photos.map(u=>`<img src="${esc(u)}" onclick="lightbox('${esc(u)}')">`).join("")}</div>`:"";
  const comments=Array.isArray(t.comments)?t.comments:[];
  const cmtHtml=comments.length?comments.map(c=>`
    <div class="cmt"><div class="cmt-meta">${esc(c.by||"")} · ${fmtDate(c.ts)}</div>
      <div class="cmt-text">${esc(c.text||"")}</div></div>`).join("")
    :`<div style="color:var(--text2);font-size:13px">No comments yet.</div>`;

  // vendor status buttons (only the flow this board drives)
  const statusBtns=VENDOR_FLOW.map(s=>{
    const sv=VENDOR_STATUS[s]; const cur=t.status===s?" cur":"";
    return `<button class="status-btn b-${s}${cur}" onclick="setStatus('${id}','${s}')">${esc(sv.label)}</button>`;
  }).join("");

  $("sheet").innerHTML=`
    <div class="sheet-h"><h2>#${esc(t.shortId||id.slice(0,6))}</h2><button class="x" onclick="closeModal()">✕ Close</button></div>
    <div class="sheet-b">
      <div class="field-label">Store</div>
      <div class="val">${esc(storeName(t.storeId))}${storeNum(t.storeId)?(" · #"+esc(storeNum(t.storeId))):""}
        ${storeAddr(t.storeId)?`<div style="font-size:12px;color:var(--text2)">${esc(storeAddr(t.storeId))}</div>`:""}</div>
      <div class="field-label">Status</div>
      <div class="status-row">${statusBtns}</div>
      <div class="field-label">Job</div>
      <div class="val">${esc(t.description||"(no description)")}</div>
      ${photoHtml}
      <div class="field-label">Comments</div>
      <div class="cmts" id="cmts">${cmtHtml}</div>
      <textarea class="cmt-in" id="cmtIn" placeholder="Add a comment…"></textarea>
      <button class="btn btn-primary" id="cmtSend" onclick="postComment('${id}')" style="margin-top:8px;width:100%">Post comment</button>
    </div>`;
  $("modal").classList.add("on");
  document.body.style.overflow="hidden";
};
window.closeModal=function(){ $("modal").classList.remove("on"); document.body.style.overflow=""; openId=null; };
window.lightbox=function(u){ $("lightboxImg").src=u; $("lightbox").classList.add("on"); };

// ── Writes (status + comments) — to the SAME ticket record ──
window.setStatus=async function(id,s){
  const t=TICKETS[id]; if(!t||t.status===s) { closeModal(); return; }
  const activity=Array.isArray(t.activity)?t.activity.slice():[];
  activity.push({ts:now(),by:(VENDOR&&VENDOR.name)||VENDOR_ID,role:"vendor",action:"status",toStatus:s,note:"via vendor board"});
  const updated={...t,status:s,activity,updatedAt:now()};
  delete updated._id;
  try{
    await apiWriteTicket(id,updated);
    TICKETS[id]=updated;
    toast("Status updated · "+statusView(s).label);
    render(); openTicket(id);
  }catch(e){ toast(e.message||"Update failed","err"); }
};

window.postComment=async function(id){
  const inp=$("cmtIn"); const text=(inp.value||"").trim();
  if(!text){toast("Write something first","err");return}
  const btn=$("cmtSend"); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  const t=TICKETS[id];
  const comments=Array.isArray(t.comments)?t.comments.slice():[];
  comments.push({id:uid(),by:(VENDOR&&VENDOR.name)||VENDOR_ID,role:"vendor",text,ts:now()});
  const updated={...t,comments,updatedAt:now()}; delete updated._id;
  try{
    await apiWriteTicket(id,updated);
    TICKETS[id]=updated;
    toast("Comment posted"); openTicket(id);
  }catch(e){ btn.disabled=false; btn.textContent="Post comment"; toast(e.message||"Failed","err"); }
};

// ── Boot + poll ──
async function refresh(){
  const dot=$("poll"); dot.textContent="syncing…";
  try{
    // Don't clobber the detail view if it's open and the user may be typing.
    const typing=document.activeElement && document.activeElement.id==="cmtIn";
    await load();
    if(!openId || !typing) render();
    if(openId && !typing) openTicket(openId);   // refresh open ticket with latest
  }catch(e){ /* keep last good render */ }
  dot.textContent="live";
}

(async()=>{
  try{ await load(); render(); }
  catch(e){ $("list").innerHTML=`<div class="empty">Couldn't load: ${esc(e.message||e)}</div>`; }
  setInterval(refresh, POLL_MS);
})();
</script>
</body>
</html>
